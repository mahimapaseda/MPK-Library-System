services:
  - type: web
    name: mpk-library-system
    env: docker
    plan: free
    repo: https://github.com/mahimapaseda/MPK-Library-System
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: APP_NAME
        value: "MPK Library System"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: FILESYSTEM_DISK
        value: local
      # --- DATABASE (non-secret values) ---
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: ep-empty-violet-amntgr7d-pooler.c-5.us-east-1.aws.neon.tech
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: neondb
      - key: DB_USERNAME
        value: neondb_owner
      - key: DB_SSLMODE
        value: require
      # DB_PASSWORD must be set manually in the Render dashboard - never commit passwords
